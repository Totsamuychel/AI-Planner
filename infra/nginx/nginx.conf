# Optional reverse proxy used in later phases.
# Currently unused — api and web are exposed directly via docker-compose.
events {}

http {
    upstream api { server api:8000; }
    upstream web { server web:3000; }

    server {
        listen 80;
        location /api/ { proxy_pass http://api/; }
        location /    { proxy_pass http://web/; }
    }
}
